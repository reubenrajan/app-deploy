<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VEBS 2026 🏆 Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
/* ─── RESET & ROOT ─── */
:root {
  --c1:#FF6B35;--c2:#FFD23F;--c3:#06D6A0;--c4:#118AB2;--c5:#EF476F;
  --bg:#FFF8F0;--card:#FFFFFF;--dark:#1A1A2E;--muted:#8892A4;
  --radius:18px;--shadow:0 8px 32px rgba(0,0,0,0.10);
  --team-a:#EF476F;--team-b:#118AB2;--team-c:#06D6A0;--team-d:#FF6B35;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;
  background-image:
    radial-gradient(circle at 15% 20%,rgba(255,107,53,0.08) 0%,transparent 40%),
    radial-gradient(circle at 85% 80%,rgba(17,138,178,0.08) 0%,transparent 40%),
    radial-gradient(circle at 50% 50%,rgba(6,214,160,0.05) 0%,transparent 60%);
  pointer-events:none;}

/* ─── SCOREKEEPER MODAL ─── */
.sk-overlay{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;
  background:rgba(26,26,46,0.88);backdrop-filter:blur(8px);padding:20px;}
.sk-modal{background:white;border-radius:26px;padding:32px 24px;width:100%;max-width:440px;
  box-shadow:0 28px 90px rgba(0,0,0,0.4);animation:modal-in 0.38s cubic-bezier(.34,1.56,.64,1);}
@keyframes modal-in{from{opacity:0;transform:scale(0.82) translateY(24px)}to{opacity:1;transform:scale(1) translateY(0)}}
.sk-modal-logo{text-align:center;margin-bottom:6px;}
.sk-modal-logo h1{font-family:'Boogaloo',cursive;font-size:34px;color:var(--dark);}
.sk-modal-logo h1 span{color:var(--c2);}
.sk-modal-logo p{font-size:13px;color:var(--muted);font-weight:700;margin-top:4px;}
.sk-divider{height:2px;background:linear-gradient(90deg,var(--c5),var(--c2),var(--c3));border-radius:2px;margin:20px 0;}
.sk-prompt{font-weight:900;font-size:16px;color:var(--dark);margin-bottom:16px;text-align:center;}
.sk-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-height:300px;overflow-y:auto;margin-bottom:20px;}
.sk-btn{padding:14px 10px;border-radius:14px;border:2px solid #EEE;background:white;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;color:var(--dark);
  cursor:pointer;transition:all 0.2s;text-align:center;display:flex;flex-direction:column;
  align-items:center;gap:7px;}
.sk-btn:hover{border-color:var(--c4);background:rgba(17,138,178,0.05);transform:translateY(-2px);}
.sk-btn.selected{border-color:var(--c3);background:rgba(6,214,160,0.08);box-shadow:0 0 0 3px rgba(6,214,160,0.2);}
.sk-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;}
.sk-no-keepers{text-align:center;padding:24px 16px;color:var(--muted);font-weight:700;grid-column:1/-1;font-size:13px;}
.sk-no-keepers span{font-size:36px;display:block;margin-bottom:8px;}
.btn-confirm-sk{width:100%;padding:16px;background:linear-gradient(135deg,var(--dark),#2D2D5E);
  color:var(--c2);border:none;border-radius:14px;font-family:'Boogaloo',cursive;
  font-size:24px;cursor:pointer;transition:all 0.2s;}
.btn-confirm-sk:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,0.2);}
.btn-confirm-sk:disabled{opacity:0.35;cursor:not-allowed;}
.sk-hint{text-align:center;font-size:11px;color:var(--muted);font-weight:700;margin-top:12px;}
.sk-skip{display:block;width:100%;margin-top:8px;padding:8px;background:none;border:none;
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;text-decoration:underline;}
.sk-skip:hover{color:var(--dark);}

/* ─── HEADER ─── */
.header{background:linear-gradient(135deg,var(--dark) 0%,#2D2D5E 100%);
  padding:20px 24px 0;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.25);}
.header::before{content:'⭐ ✝️ ⭐ ✝️ ⭐ ✝️ ⭐ ✝️ ⭐ ✝️ ⭐';
  position:absolute;top:6px;left:0;right:0;text-align:center;font-size:12px;opacity:0.22;letter-spacing:6px;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.logo{font-family:'Boogaloo',cursive;font-size:clamp(19px,5vw,30px);color:white;line-height:1.1;}
.logo span{color:var(--c2);}
.logo small{display:block;font-size:11px;color:rgba(255,255,255,0.5);font-family:'Nunito',sans-serif;font-weight:600;}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
.sync-badge{display:flex;align-items:center;gap:5px;background:rgba(6,214,160,0.15);
  border:1px solid rgba(6,214,160,0.35);border-radius:20px;padding:4px 10px;font-size:10px;color:var(--c3);font-weight:700;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--c3);animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
.sk-active-badge{display:flex;align-items:center;gap:5px;background:rgba(255,210,63,0.18);
  border:1px solid rgba(255,210,63,0.4);border-radius:20px;padding:4px 10px;
  font-size:10px;color:var(--c2);font-weight:800;cursor:pointer;transition:all 0.2s;}
.sk-active-badge:hover{background:rgba(255,210,63,0.28);}
.sk-active-dot{width:6px;height:6px;border-radius:50%;background:var(--c2);}

/* ─── TABS ─── */
.tabs{display:flex;gap:2px;}
.tab{flex:1;padding:10px 2px;text-align:center;font-family:'Nunito',sans-serif;font-weight:800;font-size:10.5px;
  color:rgba(255,255,255,0.48);cursor:pointer;border:none;background:none;
  border-bottom:3px solid transparent;transition:all 0.2s;border-radius:8px 8px 0 0;white-space:nowrap;}
.tab.active{color:var(--c2);border-bottom-color:var(--c2);background:rgba(255,210,63,0.08);}
.tab:hover:not(.active){color:rgba(255,255,255,0.78);}

/* ─── MAIN ─── */
main{position:relative;z-index:1;padding:20px 16px 100px;max-width:700px;margin:0 auto;}
.page{display:none;}

/* ─── CARDS ─── */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px;}
.card-title{font-family:'Boogaloo',cursive;font-size:20px;margin-bottom:16px;
  display:flex;align-items:center;gap:8px;color:var(--dark);}

/* ─── LEADERBOARD ─── */
.podium{display:grid;grid-template-columns:1fr 1.15fr 1fr;gap:10px;margin-bottom:20px;align-items:end;}
.podium-item{border-radius:14px;padding:14px 10px 10px;text-align:center;position:relative;transition:transform 0.3s;}
.podium-item:hover{transform:translateY(-4px);}
.podium-place{font-family:'Boogaloo',cursive;font-size:26px;}
.podium-name{font-weight:800;font-size:12px;margin:4px 0 2px;color:white;word-break:break-word;}
.podium-score{font-family:'Boogaloo',cursive;font-size:30px;color:white;}
.podium-pts{font-size:10px;color:rgba(255,255,255,0.7);font-weight:700;}
.p1{background:linear-gradient(145deg,#FFD700,#FF9500);min-height:155px;display:flex;flex-direction:column;justify-content:flex-end;}
.p2{background:linear-gradient(145deg,#C0C0C0,#8A8A8A);min-height:125px;display:flex;flex-direction:column;justify-content:flex-end;}
.p3{background:linear-gradient(145deg,#CD7F32,#8B5E3C);min-height:105px;display:flex;flex-direction:column;justify-content:flex-end;}
.crown{font-size:26px;position:absolute;top:-13px;left:50%;transform:translateX(-50%);animation:bounce-crown 2s ease-in-out infinite;}
@keyframes bounce-crown{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}
.rank-list{display:flex;flex-direction:column;gap:10px;}
.rank-row{display:grid;grid-template-columns:36px 1fr auto;align-items:center;gap:12px;
  padding:14px 16px;border-radius:12px;border:2px solid transparent;transition:all 0.3s;position:relative;overflow:hidden;}
.rank-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px;}
.rank-num{font-family:'Boogaloo',cursive;font-size:22px;color:var(--muted);text-align:center;}
.rank-info{display:flex;flex-direction:column;}
.rank-name{font-weight:800;font-size:15px;color:var(--dark);}
.rank-members{font-size:11px;color:var(--muted);margin-top:2px;}
.rank-score{font-family:'Boogaloo',cursive;font-size:28px;text-align:right;}
.bar-track{height:4px;background:#F0F0F0;border-radius:4px;margin-top:6px;}
.bar-fill{height:100%;border-radius:4px;transition:width 0.8s cubic-bezier(.34,1.56,.64,1);}
.rank-row.team-color-0{background:rgba(239,71,111,0.06);border-color:rgba(239,71,111,0.15);}
.rank-row.team-color-1{background:rgba(17,138,178,0.06);border-color:rgba(17,138,178,0.15);}
.rank-row.team-color-2{background:rgba(6,214,160,0.06);border-color:rgba(6,214,160,0.15);}
.rank-row.team-color-3{background:rgba(255,107,53,0.06);border-color:rgba(255,107,53,0.15);}
.rank-row.team-color-0::before{background:var(--team-a);}
.rank-row.team-color-1::before{background:var(--team-b);}
.rank-row.team-color-2::before{background:var(--team-c);}
.rank-row.team-color-3::before{background:var(--team-d);}
.rank-row.team-color-0 .rank-score{color:var(--team-a);}
.rank-row.team-color-1 .rank-score{color:var(--team-b);}
.rank-row.team-color-2 .rank-score{color:var(--team-c);}
.rank-row.team-color-3 .rank-score{color:var(--team-d);}
.rank-row.team-color-0 .bar-fill{background:var(--team-a);}
.rank-row.team-color-1 .bar-fill{background:var(--team-b);}
.rank-row.team-color-2 .bar-fill{background:var(--team-c);}
.rank-row.team-color-3 .bar-fill{background:var(--team-d);}

/* ─── SCORE ENTRY ─── */
.category-header{display:flex;align-items:center;gap:10px;margin:20px 0 10px;
  font-family:'Boogaloo',cursive;font-size:18px;color:var(--dark);}
.category-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;
  font-family:'Nunito',sans-serif;letter-spacing:0.5px;}
.cat-indoor{background:rgba(239,71,111,0.12);color:var(--c5);}
.cat-outdoor{background:rgba(6,214,160,0.12);color:#059669;}
.cat-water{background:rgba(17,138,178,0.12);color:var(--c4);}
.game-card{background:white;border-radius:14px;padding:16px;box-shadow:0 3px 12px rgba(0,0,0,0.07);margin-bottom:12px;}
.game-title{font-weight:800;font-size:15px;color:var(--dark);margin-bottom:6px;display:flex;align-items:center;gap:8px;}

/* ─── AUDIT NOTE ─── */
.game-audit{
  display:flex;align-items:flex-start;gap:7px;margin-bottom:12px;
  padding:7px 11px;border-radius:9px;background:#F7F8FE;
  border-left:3px solid #CBD5E1;font-size:11px;color:var(--muted);font-weight:700;line-height:1.5;
}
.game-audit.fresh{border-left-color:var(--c3);background:rgba(6,214,160,0.07);color:#065F46;}
.game-audit.warn{border-left-color:var(--c2);background:rgba(255,210,63,0.10);color:#78560A;}
.game-audit.empty-audit{border-left-color:#CBD5E1;color:var(--muted);}
.audit-who{font-weight:900;}
.audit-warn-tag{display:inline-flex;align-items:center;gap:3px;background:rgba(255,165,0,0.15);
  border:1px solid rgba(255,165,0,0.35);border-radius:8px;padding:1px 7px;
  font-size:10px;font-weight:900;color:#92600A;margin-left:4px;}

.team-score-row{display:grid;grid-template-columns:1fr auto auto auto;
  align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #F5F5F5;}
.team-score-row:last-child{border-bottom:none;}
.tsrow-name{font-weight:700;font-size:13px;}
.tsrow-score{font-family:'Boogaloo',cursive;font-size:22px;min-width:40px;text-align:center;}
.btn-score{width:34px;height:34px;border-radius:50%;border:none;font-size:18px;font-weight:900;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.btn-score:active{transform:scale(0.88);}
.btn-plus{background:var(--c3);color:white;}
.btn-minus{background:#FFE4EA;color:var(--c5);}
.btn-score:hover{filter:brightness(1.1);transform:scale(1.08);}
.custom-pts-row{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px dashed #EEE;flex-wrap:wrap;}
.custom-pts-row select,.custom-pts-row input{border:2px solid #EEE;border-radius:8px;padding:6px 10px;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;outline:none;background:#FAFAFA;}
.custom-pts-row select:focus,.custom-pts-row input:focus{border-color:var(--c3);}
.custom-pts-row input{width:70px;}
.btn-apply{padding:7px 14px;background:var(--dark);color:white;border:none;border-radius:8px;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;cursor:pointer;transition:all 0.2s;}
.btn-apply:hover{background:var(--c4);}

/* ─── SCORE ANIMATIONS ─── */
@keyframes score-bump{0%{transform:scale(1)}30%{transform:scale(1.4)}60%{transform:scale(0.9)}100%{transform:scale(1)}}
@keyframes score-drop{0%{transform:scale(1)}30%{transform:scale(0.7)}60%{transform:scale(1.1)}100%{transform:scale(1)}}
.bump{animation:score-bump 0.4s cubic-bezier(.34,1.56,.64,1);}
.drop{animation:score-drop 0.4s ease;}
@keyframes flash-green{0%,100%{background:transparent}50%{background:rgba(6,214,160,0.2)}}
@keyframes flash-red{0%,100%{background:transparent}50%{background:rgba(239,71,111,0.15)}}
.flash-green{animation:flash-green 0.5s ease;}
.flash-red{animation:flash-red 0.5s ease;}

/* ─── CONFIG TAB ─── */
.config-section{margin-bottom:24px;}
.config-section-title{font-family:'Boogaloo',cursive;font-size:21px;color:var(--dark);
  margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.config-section-title .cs-count{font-size:12px;font-family:'Nunito',sans-serif;font-weight:700;
  color:white;background:var(--muted);border-radius:20px;padding:2px 9px;margin-left:4px;}

/* Scorekeeper list */
.sk-list-cfg{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.sk-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;
  background:white;box-shadow:0 2px 8px rgba(0,0,0,0.06);border:2px solid #EEE;transition:all 0.2s;}
.sk-item.is-active{border-color:var(--c3);background:rgba(6,214,160,0.05);}
.sk-item-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:18px;flex-shrink:0;}
.sk-item-info{flex:1;}
.sk-item-name{font-weight:800;font-size:14px;color:var(--dark);display:flex;align-items:center;gap:6px;}
.active-pill{font-size:9px;background:var(--c3);color:white;border-radius:8px;padding:2px 7px;font-weight:900;}
.sk-item-sub{font-size:11px;color:var(--muted);font-weight:700;margin-top:1px;}
.btn-remove-sk{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;
  padding:4px 8px;transition:color 0.15s;border-radius:6px;}
.btn-remove-sk:hover{color:var(--c5);background:#FFF0F3;}
.add-sk-row{display:flex;gap:8px;}
.sk-input{flex:1;border:2px solid #EEE;border-radius:10px;padding:9px 14px;
  font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;outline:none;transition:border-color 0.2s;}
.sk-input:focus{border-color:var(--c4);}
.btn-add-sk{padding:9px 16px;background:var(--c4);color:white;border:none;border-radius:10px;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.btn-add-sk:hover{background:#0D6E8E;}

/* Teams */
.team-edit-card{border-radius:14px;padding:16px;margin-bottom:12px;border:2px solid transparent;}
.team-edit-card.team-color-0{background:rgba(239,71,111,0.06);border-color:rgba(239,71,111,0.2);}
.team-edit-card.team-color-1{background:rgba(17,138,178,0.06);border-color:rgba(17,138,178,0.2);}
.team-edit-card.team-color-2{background:rgba(6,214,160,0.06);border-color:rgba(6,214,160,0.2);}
.team-edit-card.team-color-3{background:rgba(255,107,53,0.06);border-color:rgba(255,107,53,0.2);}
.team-name-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.color-dot{width:18px;height:18px;border-radius:50%;flex-shrink:0;}
.color-dot-0{background:var(--team-a);}.color-dot-1{background:var(--team-b);}
.color-dot-2{background:var(--team-c);}.color-dot-3{background:var(--team-d);}
.team-name-input{flex:1;border:2px solid #EEE;border-radius:10px;padding:8px 12px;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;outline:none;background:white;transition:border-color 0.2s;}
.team-name-input:focus{border-color:var(--c4);}
.members-area{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:28px;}
.member-chip{display:flex;align-items:center;gap:5px;background:white;border:1.5px solid #EEE;
  border-radius:20px;padding:4px 10px 4px 12px;font-size:12px;font-weight:700;color:var(--dark);}
.chip-remove{background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:0;transition:color 0.15s;}
.chip-remove:hover{color:var(--c5);}
.add-member-row{display:flex;gap:8px;}
.member-input{flex:1;border:2px solid #EEE;border-radius:8px;padding:7px 12px;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;outline:none;transition:border-color 0.2s;}
.member-input:focus{border-color:var(--c3);}
.btn-add-member{padding:7px 14px;background:var(--c3);color:white;border:none;border-radius:8px;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;}
.btn-add-team{width:100%;padding:14px;background:linear-gradient(135deg,var(--dark),#2D2D5E);
  color:var(--c2);border:none;border-radius:14px;font-family:'Boogaloo',cursive;font-size:20px;
  cursor:pointer;transition:all 0.2s;margin-top:8px;}
.btn-add-team:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,0.2);}
.btn-remove-team{background:none;border:none;cursor:pointer;color:var(--muted);
  font-size:17px;padding:4px 8px;transition:color 0.15s;margin-left:auto;}
.btn-remove-team:hover{color:var(--c5);}

/* ─── HISTORY ─── */
.history-list{display:flex;flex-direction:column;gap:8px;}
.history-item{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;border-radius:11px;
  background:white;box-shadow:0 2px 8px rgba(0,0,0,0.05);border-left:4px solid transparent;
  animation:slide-in 0.3s ease;}
@keyframes slide-in{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.history-item.positive{border-color:var(--c3);}
.history-item.negative{border-color:var(--c5);}
.hist-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.hist-body{flex:1;min-width:0;}
.hist-main{font-weight:700;font-size:13px;color:var(--dark);}
.hist-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.hist-keeper-tag{display:inline-flex;align-items:center;gap:4px;border-radius:10px;
  padding:2px 8px;font-size:10px;font-weight:900;margin-top:4px;color:white;}
.hist-pts{font-family:'Boogaloo',cursive;font-size:20px;flex-shrink:0;margin-top:1px;}
.hist-pts.pos{color:var(--c3);}.hist-pts.neg{color:var(--c5);}
.btn-clear-history{padding:10px 20px;background:#FFF0F3;color:var(--c5);border:none;
  border-radius:10px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;
  cursor:pointer;transition:all 0.2s;margin-bottom:16px;}
.btn-clear-history:hover{background:var(--c5);color:white;}

/* ─── MISC ─── */
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-icon{font-size:46px;margin-bottom:12px;}
.empty p{font-weight:700;font-size:14px;}
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;}
.toast-container{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  z-index:9998;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;}
.toast{background:var(--dark);color:white;padding:10px 20px;border-radius:20px;
  font-weight:700;font-size:13px;white-space:nowrap;
  animation:toast-in 0.3s ease,toast-out 0.3s ease 2.2s forwards;
  box-shadow:0 4px 16px rgba(0,0,0,0.2);}
@keyframes toast-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toast-out{from{opacity:1}to{opacity:0;transform:translateY(10px)}}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
.spinner{width:48px;height:48px;border:5px solid #EEE;border-top-color:var(--c4);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.save-status{font-size:11px;color:var(--muted);text-align:center;padding:8px;font-weight:700;}
.save-status.saving{color:var(--c2);}.save-status.saved{color:var(--c3);}
.refresh-bar{display:flex;align-items:center;justify-content:space-between;
  background:rgba(17,138,178,0.08);border-radius:10px;padding:8px 14px;margin-bottom:12px;
  font-size:12px;font-weight:700;color:var(--c4);}
.btn-refresh{background:var(--c4);color:white;border:none;border-radius:8px;
  padding:5px 12px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;}
@media(max-width:400px){
  .podium{gap:6px;}.podium-score{font-size:24px;}
  .sk-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div class="toast-container" id="toastContainer"></div>

<!-- ══════════════════════════════════
     SCOREKEEPER SELECTION MODAL
══════════════════════════════════ -->
<div class="sk-overlay" id="skOverlay">
  <div class="sk-modal">
    <div class="sk-modal-logo">
      <h1>VEBS <span>2026</span> 🏕️</h1>
      <p>Summer Camp Scoreboard</p>
    </div>
    <div class="sk-divider"></div>
    <div class="sk-prompt">👋 Who's keeping score today?</div>
    <div class="sk-grid" id="skGrid">
      <!-- populated by JS -->
    </div>
    <button class="btn-confirm-sk" id="btnConfirmSk" onclick="confirmScorekeeper()" disabled>
      Let's Go! 🎉
    </button>
    <div class="sk-hint">You can switch scorekeepers anytime from the header badge.</div>
    <button class="sk-skip" onclick="skipScorekeeper()">Skip for now (view only)</button>
  </div>
</div>

<!-- ══════════════════════════════════
     HEADER
══════════════════════════════════ -->
<header class="header">
  <div class="header-top">
    <div class="logo">
      VEBS <span>2026</span>
      <small>🏕️ Summer Camp Scoreboard</small>
    </div>
    <div class="header-right">
      <div class="sync-badge"><div class="sync-dot"></div><span>Live Sync</span></div>
      <button class="sk-active-badge" id="skActiveBadge" onclick="showSkModal()">
        <div class="sk-active-dot"></div>
        <span id="skActiveName">View Only</span>
      </button>
    </div>
  </div>
  <nav class="tabs">
    <button class="tab active" onclick="switchPage('leaderboard')">🏆 Board</button>
    <button class="tab" onclick="switchPage('scores')">🎮 Scores</button>
    <button class="tab" onclick="switchPage('history')">📜 Log</button>
    <button class="tab" onclick="switchPage('config')">⚙️ Config</button>
  </nav>
</header>

<main>
  <!-- LOADING -->
  <div id="loadingScreen" class="loading">
    <div class="spinner"></div>
    <p style="font-weight:800;color:var(--muted)">Loading VEBS 2026…</p>
  </div>

  <!-- LEADERBOARD -->
  <div id="page-leaderboard" class="page" style="display:none">
    <div class="refresh-bar">
      <span>🔄 Auto-syncs every 10 sec</span>
      <button class="btn-refresh" onclick="loadData(true)">Refresh Now</button>
    </div>
    <div id="podium-container"></div>
    <div class="card">
      <div class="card-title">📊 Full Rankings</div>
      <div id="rank-list" class="rank-list"></div>
    </div>
    <div class="save-status" id="saveStatus">✅ All data saved</div>
  </div>

  <!-- SCORES -->
  <div id="page-scores" class="page" style="display:none">
    <div id="scores-content"></div>
  </div>

  <!-- HISTORY -->
  <div id="page-history" class="page" style="display:none">
    <button class="btn-clear-history" onclick="clearHistory()">🗑️ Clear History</button>
    <div id="history-content" class="history-list"></div>
  </div>

  <!-- CONFIG -->
  <div id="page-config" class="page" style="display:none">

    <!-- SCOREKEEPERS -->
    <div class="config-section">
      <div class="config-section-title">
        🙋 Scorekeepers
        <span class="cs-count" id="sk-count-badge">0</span>
      </div>
      <div class="card">
        <div id="sk-list-render" class="sk-list-cfg"></div>
        <div class="add-sk-row">
          <input class="sk-input" id="skNameInput" placeholder="Enter scorekeeper name…"
            onkeydown="if(event.key==='Enter') addScorekeeper()"/>
          <button class="btn-add-sk" onclick="addScorekeeper()">+ Add</button>
        </div>
      </div>
    </div>

    <!-- TEAMS -->
    <div class="config-section">
      <div class="config-section-title">
        👥 Teams
        <span class="cs-count" id="team-count-badge">0</span>
      </div>
      <div id="teams-content"></div>
    </div>

  </div>
</main>

<script>
// ══════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════
const STORAGE_KEY = 'vebs2026_v4';
const POLL_INTERVAL = 10000;
const TEAM_COLORS = ['#EF476F','#118AB2','#06D6A0','#FF6B35'];
const TEAM_NAMES_DEFAULT = ['Team Alpha','Team Beta','Team Gamma','Team Delta'];
const SK_COLORS = ['#7C3AED','#DB2777','#059669','#D97706','#2563EB','#DC2626','#0891B2','#65A30D'];
const SK_EMOJIS = ['🦁','🦊','🐯','🦅','🌟','⚡','🔥','💎'];

const GAMES = {
  indoor:[
    {id:'treasure_hunt',name:'Treasure Hunt',icon:'🗺️'},
    {id:'bible_trivia',name:'Bible Trivia',icon:'📖'},
    {id:'bible_sword_drill',name:'Bible Sword Drill',icon:'⚔️'},
  ],
  outdoor:[
    {id:'dodge_ball',name:'Dodge Ball',icon:'⚽'},
    {id:'kickball',name:'Kickball',icon:'🥎'},
  ],
  water:[
    {id:'marco_polo',name:'Marco Polo',icon:'🌊'},
    {id:'through_ball',name:'Through Ball',icon:'💧'},
  ]
};

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let state = { teams:[], scorekeepers:[], history:[], lastLeader:null, gameAudit:{} };
let activeKeeper = null;
let selectedInModal = null;
let saveTimer = null;

// ══════════════════════════════════════════
//  STORAGE
// ══════════════════════════════════════════
async function saveData() {
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(state), true);
    showSaveStatus('saved');
  } catch(e) { showSaveStatus('error'); }
}

async function loadData(showToast=false) {
  try {
    const r = await window.storage.get(STORAGE_KEY, true);
    if (r && r.value) {
      const loaded = JSON.parse(r.value);
      if (loaded.teams && loaded.teams.length > 0) state = loaded;
    }
  } catch(e) {}
  if (!state.gameAudit) state.gameAudit = {};
  if (!state.scorekeepers) state.scorekeepers = [];
  renderAll();
  if (showToast) showToast_('🔄 Scores refreshed!');
}

function showSaveStatus(s) {
  const el = document.getElementById('saveStatus');
  if (!el) return;
  if (s==='saving'){el.className='save-status saving';el.textContent='💾 Saving…';}
  else if(s==='saved'){el.className='save-status saved';el.textContent='✅ All data saved';}
  else{el.className='save-status';el.textContent='⚠️ Save error';}
}

function scheduleSave() {
  showSaveStatus('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveData, 800);
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
function initDefault() {
  state.teams = TEAM_NAMES_DEFAULT.slice(0,2).map((name,i)=>({
    id:'team_'+i, name, members:[], scores:{}
  }));
  state.scorekeepers = [];
  state.history = [];
  state.lastLeader = null;
  state.gameAudit = {};
}

async function init() {
  initDefault();
  await loadData();
  document.getElementById('loadingScreen').style.display='none';
  showSkModal();
  setInterval(loadData, POLL_INTERVAL);
}

// ══════════════════════════════════════════
//  SCOREKEEPER MODAL
// ══════════════════════════════════════════
function showSkModal() {
  selectedInModal = null;
  document.getElementById('btnConfirmSk').disabled = true;
  renderSkModal();
  document.getElementById('skOverlay').style.display = 'flex';
}

function renderSkModal() {
  const grid = document.getElementById('skGrid');
  if (!state.scorekeepers || state.scorekeepers.length === 0) {
    grid.innerHTML = `<div class="sk-no-keepers">
      <span>⚙️</span>
      No scorekeepers set up yet.<br/>
      Go to <strong>Config → Scorekeepers</strong> to add names first,<br/>then come back here to select.
    </div>`;
    return;
  }
  grid.innerHTML = state.scorekeepers.map(sk => {
    const ci = sk.colorIdx % SK_COLORS.length;
    const sel = selectedInModal && selectedInModal.id === sk.id;
    return `<button class="sk-btn${sel?' selected':''}" onclick="selectInModal('${sk.id}')">
      <div class="sk-avatar" style="background:${SK_COLORS[ci]}">${SK_EMOJIS[ci]}</div>
      ${esc(sk.name)}
    </button>`;
  }).join('');
}

function selectInModal(skId) {
  selectedInModal = state.scorekeepers.find(s => s.id === skId) || null;
  document.getElementById('btnConfirmSk').disabled = !selectedInModal;
  renderSkModal();
}

function confirmScorekeeper() {
  if (!selectedInModal) return;
  activeKeeper = selectedInModal;
  document.getElementById('skOverlay').style.display = 'none';
  document.getElementById('skActiveName').textContent = activeKeeper.name;
  switchPage('leaderboard');
  showToast_(`👋 Welcome, ${activeKeeper.name}!`);
}

function skipScorekeeper() {
  activeKeeper = null;
  document.getElementById('skOverlay').style.display = 'none';
  document.getElementById('skActiveName').textContent = 'View Only';
  switchPage('leaderboard');
}

// ══════════════════════════════════════════
//  SCORING
// ══════════════════════════════════════════
function getScore(team, gameId) { return (team.scores && team.scores[gameId]) || 0; }
function getTotalScore(team) {
  if (!team.scores) return 0;
  return Object.values(team.scores).reduce((a,b)=>a+b,0);
}
function getSortedTeams() { return [...state.teams].sort((a,b)=>getTotalScore(b)-getTotalScore(a)); }
function getMaxScore() { return Math.max(...state.teams.map(t=>getTotalScore(t)),1); }

function adjustScore(teamId, gameId, delta, gameName, teamName) {
  if (!activeKeeper) {
    showToast_('⚠️ Select a scorekeeper first!');
    showSkModal();
    return;
  }
  const team = state.teams.find(t=>t.id===teamId);
  if (!team) return;
  if (!team.scores) team.scores={};
  team.scores[gameId] = Math.max(0,(team.scores[gameId]||0)+delta);

  // Audit record for this game
  const now = new Date();
  state.gameAudit[gameId] = {
    keeperId: activeKeeper.id,
    keeperName: activeKeeper.name,
    keeperColorIdx: activeKeeper.colorIdx,
    time: now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
    timestamp: now.getTime()
  };

  // History
  state.history.unshift({
    id:Date.now(), teamId, teamName, gameId, gameName, delta,
    newScore:team.scores[gameId], total:getTotalScore(team),
    time:now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
    keeperName:activeKeeper.name, keeperColorIdx:activeKeeper.colorIdx,
    type:delta>0?'positive':'negative'
  });
  if (state.history.length>100) state.history.pop();

  checkLeaderChange();
  scheduleSave();
  renderAll();

  // Animate
  const el = document.getElementById(`score-${teamId}-${gameId}`);
  if(el){el.classList.remove('bump','drop');void el.offsetWidth;el.classList.add(delta>0?'bump':'drop');}
  const row = document.getElementById(`row-${teamId}-${gameId}`);
  if(row){row.classList.remove('flash-green','flash-red');void row.offsetWidth;row.classList.add(delta>0?'flash-green':'flash-red');}
}

function applyCustomFromGame(gameId, gameName) {
  if (!activeKeeper){showToast_('⚠️ Select a scorekeeper first!');showSkModal();return;}
  const sel = document.getElementById(`cteam-${gameId}`);
  const inp = document.getElementById(`custom-${gameId}`);
  if(!sel||!inp) return;
  const team = state.teams.find(t=>t.id===sel.value);
  if(!team) return;
  const val = parseInt(inp.value);
  if(isNaN(val)){showToast_('⚠️ Enter a valid number');return;}
  adjustScore(sel.value,gameId,val,gameName,team.name);
  inp.value='';
  showToast_(`${val>0?'+':''}${val} pts → ${team.name}`);
}

function checkLeaderChange() {
  const sorted = getSortedTeams();
  if(!sorted.length) return;
  const leader = sorted[0];
  if(state.lastLeader!==leader.id && getTotalScore(leader)>0){
    if(state.lastLeader!==null){launchConfetti();showToast_(`🎉 ${leader.name} takes the lead!`);}
    state.lastLeader=leader.id;
  }
}

// ══════════════════════════════════════════
//  AUDIT NOTE
// ══════════════════════════════════════════
function buildAuditNote(gameId) {
  const audit = state.gameAudit && state.gameAudit[gameId];
  if (!audit) {
    return `<div class="game-audit empty-audit">
      <span>⏳</span> No scores recorded yet for this game.
    </div>`;
  }
  const ageMs = Date.now() - audit.timestamp;
  const ageMin = Math.floor(ageMs / 60000);
  const ageStr = ageMin < 1 ? 'just now' : ageMin < 60 ? `${ageMin} min ago` : `${Math.floor(ageMin/60)}h ${ageMin%60}m ago`;

  // Warn if currently active keeper is the same one who last updated
  const isCurrentKeeper = activeKeeper && audit.keeperId === activeKeeper.id;
  const cls = isCurrentKeeper ? 'warn' : 'fresh';
  const icon = isCurrentKeeper ? '⚠️' : '✏️';
  const warnTag = isCurrentKeeper
    ? `<span class="audit-warn-tag">⛔ You last updated this — double check before adding more!</span>`
    : '';

  return `<div class="game-audit ${cls}">
    <span>${icon}</span>
    <span>Last updated by <span class="audit-who">${esc(audit.keeperName)}</span> at ${audit.time} &nbsp;·&nbsp; ${ageStr}${warnTag}</span>
  </div>`;
}

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
function renderAll() {
  renderLeaderboard();
  renderScores();
  renderConfig();
  renderHistory();
}

function colorIdx(teamId) {
  return state.teams.findIndex(t=>t.id===teamId) % 4;
}

function renderLeaderboard() {
  const sorted = getSortedTeams();
  const max = getMaxScore();
  const pc = document.getElementById('podium-container');
  if(!pc) return;

  if(sorted.length===0){
    pc.innerHTML='<div class="empty"><div class="empty-icon">🏁</div><p>Add teams in Config to get started!</p></div>';
    document.getElementById('rank-list').innerHTML='';
    return;
  }

  const pOrder = sorted.length>=3?[sorted[1],sorted[0],sorted[2]]:
    sorted.length===2?[sorted[1],sorted[0],null]:[null,sorted[0],null];
  const pCls=['p2','p1','p3'],pLbl=['🥈','🥇','🥉'];

  pc.innerHTML=`<div class="podium">${pOrder.map((t,i)=>t?`
    <div class="podium-item ${pCls[i]}">
      ${i===1?'<div class="crown">👑</div>':''}
      <div class="podium-place">${pLbl[i]}</div>
      <div class="podium-name">${esc(t.name)}</div>
      <div class="podium-score">${getTotalScore(t)}</div>
      <div class="podium-pts">pts</div>
    </div>`:'<div></div>').join('')}</div>`;

  document.getElementById('rank-list').innerHTML=sorted.map((t,i)=>{
    const ci=colorIdx(t.id);
    const total=getTotalScore(t);
    const pct=max>0?Math.round(total/max*100):0;
    const members=t.members&&t.members.length>0?t.members.join(', '):'No members yet';
    return `<div class="rank-row team-color-${ci}">
      <div class="rank-num">${i+1}</div>
      <div class="rank-info">
        <div class="rank-name">${esc(t.name)}</div>
        <div class="rank-members">${esc(members)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="rank-score">${total}<small style="font-size:12px;font-family:Nunito;font-weight:700;color:var(--muted)"> pts</small></div>
    </div>`;
  }).join('');
}

function renderScores() {
  const sc = document.getElementById('scores-content');
  if(!sc) return;
  if(state.teams.length===0){
    sc.innerHTML='<div class="empty"><div class="empty-icon">👥</div><p>Add teams first in the Config tab!</p></div>';
    return;
  }
  const cats=[
    {key:'indoor',label:'Indoor Games',icon:'🏠',badge:'cat-indoor'},
    {key:'outdoor',label:'Outdoor Games',icon:'🌿',badge:'cat-outdoor'},
    {key:'water',label:'Water Games',icon:'💦',badge:'cat-water'},
  ];
  sc.innerHTML=cats.map(cat=>`
    <div class="category-header">${cat.icon} ${cat.label}
      <span class="category-badge ${cat.badge}">${cat.key.toUpperCase()}</span>
    </div>
    ${GAMES[cat.key].map(game=>`
      <div class="game-card">
        <div class="game-title">${game.icon} ${game.name}</div>
        ${buildAuditNote(game.id)}
        ${state.teams.map(team=>{
          const ci=colorIdx(team.id);
          const score=getScore(team,game.id);
          return `<div class="team-score-row" id="row-${team.id}-${game.id}">
            <div class="tsrow-name" style="color:${TEAM_COLORS[ci]}">${esc(team.name)}</div>
            <div class="tsrow-score" id="score-${team.id}-${game.id}" style="color:${TEAM_COLORS[ci]}">${score}</div>
            <button class="btn-score btn-minus" onclick="adjustScore('${team.id}','${game.id}',-1,'${esc(game.name)}','${esc(team.name)}')">−</button>
            <button class="btn-score btn-plus" onclick="adjustScore('${team.id}','${game.id}',1,'${esc(game.name)}','${esc(team.name)}')">+</button>
          </div>`;
        }).join('')}
        <div class="custom-pts-row">
          <select id="cteam-${game.id}" style="flex:1;min-width:0">
            ${state.teams.map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('')}
          </select>
          <input id="custom-${game.id}" type="number" placeholder="pts"
            style="width:65px;border:2px solid #EEE;border-radius:8px;padding:6px 8px;font-family:Nunito;font-size:13px;font-weight:700;outline:none;background:#FAFAFA;"/>
          <button class="btn-apply" onclick="applyCustomFromGame('${game.id}','${esc(game.name)}')">Apply</button>
        </div>
      </div>
    `).join('')}
  `).join('');
}

function renderConfig() {
  renderSkListConfig();
  renderTeams();
}

function renderSkListConfig() {
  const el = document.getElementById('sk-list-render');
  const badge = document.getElementById('sk-count-badge');
  if(!el) return;
  if(badge) badge.textContent = state.scorekeepers.length;

  if(state.scorekeepers.length===0){
    el.innerHTML=`<div style="font-size:13px;color:var(--muted);font-weight:700;padding:4px 0 12px">
      No scorekeepers yet. Add names below so they can select themselves on launch.
    </div>`;
    return;
  }

  el.innerHTML=state.scorekeepers.map((sk,i)=>{
    const ci=sk.colorIdx%SK_COLORS.length;
    const isActive=activeKeeper&&activeKeeper.id===sk.id;
    return `<div class="sk-item${isActive?' is-active':''}">
      <div class="sk-item-avatar" style="background:${SK_COLORS[ci]}">${SK_EMOJIS[ci]}</div>
      <div class="sk-item-info">
        <div class="sk-item-name">
          ${esc(sk.name)}
          ${isActive?'<span class="active-pill">● YOU</span>':''}
        </div>
        <div class="sk-item-sub">Scorekeeper #${i+1}</div>
      </div>
      ${!isActive?`<button class="btn-remove-sk" onclick="removeScorekeeper('${sk.id}')" title="Remove">✕</button>`:''}
    </div>`;
  }).join('');
}

function renderTeams() {
  const tc = document.getElementById('teams-content');
  const badge = document.getElementById('team-count-badge');
  if(!tc) return;
  if(badge) badge.textContent = state.teams.length;

  tc.innerHTML=state.teams.map((team,i)=>{
    const ci=i%4;
    return `<div class="team-edit-card team-color-${ci}">
      <div class="team-name-row">
        <div class="color-dot color-dot-${ci}"></div>
        <input class="team-name-input" value="${esc(team.name)}"
          onchange="updateTeamName('${team.id}',this.value)" placeholder="Team Name"/>
        ${state.teams.length>1?`<button class="btn-remove-team" onclick="removeTeam('${team.id}')">✕</button>`:''}
      </div>
      <div class="members-area">
        ${(team.members||[]).map(m=>`<span class="member-chip">${esc(m)}
          <button class="chip-remove" onclick="removeMember('${team.id}','${esc(m)}')">✕</button>
        </span>`).join('')}
        ${(team.members||[]).length===0?'<span style="font-size:12px;color:var(--muted);font-weight:700">No members yet</span>':''}
      </div>
      <div class="add-member-row">
        <input class="member-input" id="minput-${team.id}" placeholder="Add member name…"
          onkeydown="if(event.key==='Enter') addMember('${team.id}')"/>
        <button class="btn-add-member" onclick="addMember('${team.id}')">+ Add</button>
      </div>
    </div>`;
  }).join('');

  if(state.teams.length<4)
    tc.innerHTML+=`<button class="btn-add-team" onclick="addTeam()">+ Add New Team</button>`;
}

function renderHistory() {
  const hc=document.getElementById('history-content');
  if(!hc) return;
  if(!state.history||state.history.length===0){
    hc.innerHTML='<div class="empty"><div class="empty-icon">📜</div><p>No score activity yet!</p></div>';
    return;
  }
  hc.innerHTML=state.history.slice(0,60).map(h=>{
    const sign=h.delta>0?'+':'';
    const ci=(h.keeperColorIdx||0)%SK_COLORS.length;
    return `<div class="history-item ${h.type}">
      <div class="hist-icon">${h.delta>0?'📈':'📉'}</div>
      <div class="hist-body">
        <div class="hist-main">${esc(h.teamName)} — ${esc(h.gameName)}</div>
        <div class="hist-sub">🕐 ${h.time} · Total after: ${h.total} pts</div>
        ${h.keeperName?`<div class="hist-keeper-tag" style="background:${SK_COLORS[ci]}">
          ${SK_EMOJIS[ci]} ${esc(h.keeperName)}</div>`:''}
      </div>
      <div class="hist-pts ${h.delta>0?'pos':'neg'}">${sign}${h.delta}</div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════
//  SCOREKEEPER MGMT
// ══════════════════════════════════════════
function addScorekeeper() {
  const inp=document.getElementById('skNameInput');
  const name=inp.value.trim();
  if(!name){showToast_('⚠️ Enter a name');return;}
  if(state.scorekeepers.find(s=>s.name.toLowerCase()===name.toLowerCase())){
    showToast_('Name already exists!');return;
  }
  const colorIdx=state.scorekeepers.length%SK_COLORS.length;
  state.scorekeepers.push({id:'sk_'+Date.now(),name,colorIdx});
  inp.value='';
  scheduleSave();
  renderConfig();
  showToast_(`✅ ${name} added as scorekeeper`);
}

function removeScorekeeper(skId) {
  if(activeKeeper&&activeKeeper.id===skId){
    showToast_('⚠️ Cannot remove active scorekeeper');return;
  }
  if(!confirm('Remove this scorekeeper?')) return;
  state.scorekeepers=state.scorekeepers.filter(s=>s.id!==skId);
  scheduleSave();renderConfig();
}

// ══════════════════════════════════════════
//  TEAM MGMT
// ══════════════════════════════════════════
function updateTeamName(teamId,newName){
  const t=state.teams.find(t=>t.id===teamId);
  if(t){t.name=newName.trim()||t.name;scheduleSave();renderLeaderboard();renderScores();}
}
function addTeam(){
  if(state.teams.length>=4) return;
  state.teams.push({id:'team_'+Date.now(),name:TEAM_NAMES_DEFAULT[state.teams.length]||'New Team',members:[],scores:{}});
  scheduleSave();renderAll();
}
function removeTeam(teamId){
  if(state.teams.length<=1) return;
  if(!confirm('Remove this team and all their scores?')) return;
  state.teams=state.teams.filter(t=>t.id!==teamId);
  state.history=state.history.filter(h=>h.teamId!==teamId);
  scheduleSave();renderAll();
}
function addMember(teamId){
  const inp=document.getElementById(`minput-${teamId}`);
  if(!inp) return;
  const name=inp.value.trim();
  if(!name) return;
  const team=state.teams.find(t=>t.id===teamId);
  if(!team) return;
  if(!team.members) team.members=[];
  if(team.members.includes(name)){showToast_('Already in team!');return;}
  team.members.push(name);
  inp.value='';
  scheduleSave();renderTeams();renderLeaderboard();
}
function removeMember(teamId,name){
  const team=state.teams.find(t=>t.id===teamId);
  if(!team) return;
  team.members=(team.members||[]).filter(m=>m!==name);
  scheduleSave();renderTeams();renderLeaderboard();
}
function clearHistory(){
  if(!confirm('Clear all score history?')) return;
  state.history=[];scheduleSave();renderHistory();
}

// ══════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════
function switchPage(page){
  document.querySelectorAll('.page').forEach(p=>p.style.display='none');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const pg=document.getElementById('page-'+page);
  if(pg) pg.style.display='block';
  const order=['leaderboard','scores','history','config'];
  const tabs=document.querySelectorAll('.tab');
  const idx=order.indexOf(page);
  if(tabs[idx]) tabs[idx].classList.add('active');
}

// ══════════════════════════════════════════
//  CONFETTI
// ══════════════════════════════════════════
function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const colors=['#FF6B35','#FFD23F','#06D6A0','#118AB2','#EF476F','#FFE66D','#fff'];
  const pieces=Array.from({length:130},()=>({
    x:Math.random()*canvas.width,y:-20,
    w:Math.random()*12+4,h:Math.random()*8+3,
    color:colors[Math.floor(Math.random()*colors.length)],
    vx:(Math.random()-0.5)*4,vy:Math.random()*4+2,
    rot:Math.random()*360,vr:(Math.random()-0.5)*8,alpha:1
  }));
  let frame;
  (function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.alpha-=0.008;
      ctx.save();ctx.globalAlpha=Math.max(0,p.alpha);
      ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
    });
    if(pieces.some(p=>p.alpha>0)){frame=requestAnimationFrame(animate);}
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  })();
}

// ══════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════
function showToast_(msg){
  const c=document.getElementById('toastContainer');
  const t=document.createElement('div');
  t.className='toast';t.textContent=msg;c.appendChild(t);
  setTimeout(()=>t.remove(),2700);
}

// ══════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════
function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

window.addEventListener('load',init);
</script>
